<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ニコタイチャット 設定</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>表示設定</h1>
      <fieldset>
        <legend>チャット入力の表示方法</legend>
        <label>
          <input type="radio" name="displayMode" value="overlay" />
          <span>
            <strong>ページ内パネル</strong>
            <small>配信ページの右下に表示します。</small>
          </span>
        </label>
        <label>
          <input type="radio" name="displayMode" value="popup" />
          <span>
            <strong>別ウィンドウ</strong>
            <small>独立した小さなウィンドウで表示します。</small>
          </span>
        </label>
      </fieldset>
      <section>
        <h2>Twitch連携</h2>
        <button id="disconnectTwitch" type="button">Twitch連携を解除</button>
        <p class="note">保存されたTwitch認証を削除し、Twitch側のアクセストークンを無効化します。</p>
      </section>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
